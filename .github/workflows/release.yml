name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v2026.06.30.1"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Build helper binaries
        run: bash scripts/build-helpers.sh

      - name: Package modules
        run: |
          set -euo pipefail
          python3 scripts/package-module.py --output "dist/星盘.zip"
          python3 scripts/package-module.py --abi arm64-v8a --output "dist/星盘_arm64-v8a.zip"
          python3 scripts/package-module.py --abi x86_64 --output "dist/星盘_x86_64.zip"
          python3 scripts/write-update-json.py \
            --repository "${{ github.repository }}" \
            --zip-name "星盘.zip"
          test -f "dist/星盘.zip"
          test -f "dist/星盘_arm64-v8a.zip"
          test -f "dist/星盘_x86_64.zip"
          test -f dist/update.json
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: singbox_tun_Magic
          path: dist/

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          version="${tag#v}"
          prop_version="$(grep '^version=' module/module.prop | cut -d= -f2-)"
          if [ "${version}" != "${prop_version}" ]; then
            echo "module.prop version (${prop_version}) does not match tag (${tag})" >&2
            exit 1
          fi

          gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --yes 2>/dev/null || true
          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "星盘 ${tag}" \
            --notes "实现 sing-box TUN 免流/代理分层路由模型。" \
            --latest \
            "dist/星盘.zip" \
            "dist/星盘_arm64-v8a.zip" \
            "dist/星盘_x86_64.zip" \
            "dist/update.json"

          names="$(gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
          echo "${names}" | grep -Fx "星盘.zip"
          echo "${names}" | grep -Fx "星盘_arm64-v8a.zip"
          echo "${names}" | grep -Fx "星盘_x86_64.zip"
          echo "${names}" | grep -Fx "update.json"

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" \
            --jq '.assets[] | {name, label, size}'
